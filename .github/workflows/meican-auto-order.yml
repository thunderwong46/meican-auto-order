name: Meican Auto Order

on:
  schedule:
    # Temporary one-off run: 06:00 UTC is 14:00 in China Standard Time on 2026-06-03.
    - cron: "0 6 3 6 *"
    # GitHub Actions uses UTC. 04:03 UTC is 12:03 in China Standard Time.
    - cron: "3 4 * * 1,2,3,4,6"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview only, do not submit orders"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      target_date:
        description: "Optional target date, YYYY-MM-DD"
        required: false
        type: string
      notify_test_only:
        description: "Send a Feishu test notification only"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  order:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Check script syntax
        run: npm run check

      - name: Guard temporary 14:00 run
        if: github.event_name == 'schedule' && github.event.schedule == '0 6 3 6 *'
        run: |
          if [ "$(date -u +%F)" != "2026-06-03" ]; then
            echo "Temporary 14:00 CST run is only valid on 2026-06-03."
            echo "SKIP_ORDER=true" >> "$GITHUB_ENV"
          fi

      - name: Order meals
        if: env.SKIP_ORDER != 'true'
        env:
          MEICAN_USERNAME: ${{ secrets.MEICAN_USERNAME }}
          MEICAN_PASSWORD: ${{ secrets.MEICAN_PASSWORD }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          TARGET_DATE: ${{ inputs.target_date }}
          NOTIFY_TEST_ONLY: ${{ inputs.notify_test_only || 'false' }}
          DEFAULT_PICKUP_LOCATION: "汇金A座62楼"
        run: npm run order
